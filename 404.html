<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Lost in the Data Void | Abhishek Kumar</title>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; frame-ancestors 'none';">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #030014;
            --cyan: #00d4ff;
            --purple: #7b2fff;
            --magenta: #ff003c;
            --green: #00ff9d;
            --gold: #ffd700;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            color: #e0e6f0;
        }

        /* ===== STARFIELD CANVAS ===== */
        canvas#starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ===== SCANLINES ===== */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
            pointer-events: none;
        }

        /* ===== MAIN CONTENT ===== */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        /* ===== 404 GLITCH NUMBER ===== */
        .error-code {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(6rem, 18vw, 14rem);
            font-weight: 900;
            line-height: 1;
            position: relative;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 40%, var(--magenta) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glitchPulse 4s ease-in-out infinite;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 40px rgba(0, 212, 255, 0.3));
        }

        .error-code::before,
        .error-code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error-code::before {
            animation: glitchBefore 3s infinite;
            color: var(--cyan);
        }

        .error-code::after {
            animation: glitchAfter 3s infinite;
            color: var(--magenta);
        }

        @keyframes glitchPulse {

            0%,
            100% {
                filter: drop-shadow(0 0 40px rgba(0, 212, 255, 0.3));
            }

            50% {
                filter: drop-shadow(0 0 80px rgba(123, 47, 255, 0.5));
            }
        }

        @keyframes glitchBefore {

            0%,
            92%,
            100% {
                clip-path: inset(0 0 0 0);
                transform: translate(0);
                opacity: 0;
            }

            93% {
                clip-path: inset(20% 0 60% 0);
                transform: translate(-4px, 2px);
                opacity: 0.7;
            }

            95% {
                clip-path: inset(60% 0 10% 0);
                transform: translate(3px, -1px);
                opacity: 0.7;
            }

            97% {
                clip-path: inset(40% 0 30% 0);
                transform: translate(-2px, 1px);
                opacity: 0.7;
            }
        }

        @keyframes glitchAfter {

            0%,
            90%,
            100% {
                clip-path: inset(0 0 0 0);
                transform: translate(0);
                opacity: 0;
            }

            91% {
                clip-path: inset(50% 0 20% 0);
                transform: translate(3px, -2px);
                opacity: 0.5;
            }

            94% {
                clip-path: inset(10% 0 70% 0);
                transform: translate(-3px, 2px);
                opacity: 0.5;
            }

            96% {
                clip-path: inset(70% 0 5% 0);
                transform: translate(2px, -1px);
                opacity: 0.5;
            }
        }

        /* ===== SUBTITLE ===== */
        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            color: var(--cyan);
            opacity: 0.8;
            margin-bottom: 0.8rem;
            letter-spacing: 2px;
        }

        .subtitle .blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        .tagline {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: #8892b0;
            max-width: 600px;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .tagline em {
            color: var(--green);
            font-style: normal;
            font-weight: 600;
        }

        /* ===== BUTTONS ===== */
        .actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .btn:hover::before {
            transform: translateX(100%);
        }

        .btn-home {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #fff;
            border: none;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .btn-home:hover {
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.4), 0 0 100px rgba(123, 47, 255, 0.2);
            transform: translateY(-3px);
        }

        .btn-fact {
            background: transparent;
            color: var(--green);
            border: 1px solid rgba(0, 255, 157, 0.4);
        }

        .btn-fact:hover {
            background: rgba(0, 255, 157, 0.08);
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.15);
            transform: translateY(-3px);
        }

        /* ===== FUN FACT DISPLAY ===== */
        .fact-zone {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 90%;
            max-width: 700px;
            pointer-events: none;
        }

        .fact-card {
            background: rgba(10, 10, 40, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 12px;
            padding: 20px 28px;
            text-align: left;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .fact-card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .fact-card.hiding {
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
            transition: all 5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--cyan), var(--purple), var(--magenta));
            animation: shimmer 2s linear infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .fact-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fact-label .icon {
            font-size: 1rem;
        }

        .fact-label.data {
            color: var(--cyan);
        }

        .fact-label.ai {
            color: var(--purple);
        }

        .fact-label.tech {
            color: var(--green);
        }

        .fact-label.fun {
            color: var(--gold);
        }

        .fact-text {
            font-size: 1rem;
            line-height: 1.65;
            color: #c8d0e0;
        }

        .fact-text strong {
            color: #fff;
            font-weight: 600;
        }

        .fact-text .highlight {
            color: var(--cyan);
            font-weight: 600;
        }

        .fact-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: var(--cyan);
            border-radius: 0 0 12px 12px;
            animation: progressShrink 20s linear forwards;
        }

        @keyframes progressShrink {
            from {
                width: 100%;
            }

            to {
                width: 0%;
            }
        }

        /* ===== SHOOTING STAR FACTS (floating across screen) ===== */
        .shooting-fact {
            position: fixed;
            z-index: 15;
            white-space: nowrap;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            pointer-events: none;
            text-shadow: 0 0 10px currentColor;
        }

        .shooting-fact::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 100%;
            width: 120px;
            height: 1px;
            transform: translateY(-50%);
            background: linear-gradient(to left, currentColor, transparent);
        }

        /* ===== FLOATING PARTICLES ===== */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
        }

        /* ===== COUNTER ===== */
        .lost-counter {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 20;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: rgba(0, 212, 255, 0.4);
            text-align: right;
            line-height: 1.8;
        }

        .lost-counter span {
            color: var(--cyan);
            font-weight: 500;
        }

        /* ===== LOGO ===== */
        .logo-link {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 20;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--cyan);
            text-decoration: none;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .logo-link:hover {
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
        }

        .logo-link .bracket {
            color: rgba(0, 212, 255, 0.5);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .lost-counter {
                display: none;
            }

            .fact-card {
                padding: 14px 18px;
            }

            .fact-text {
                font-size: 0.9rem;
            }

            .actions {
                gap: 0.6rem;
            }

            .btn {
                padding: 12px 20px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<body>
    <canvas id="starfield"></canvas>
    <div class="scanlines"></div>

    <!-- Logo -->
    <a href="index.html" class="logo-link"><span class="bracket">&lt;</span>AK<span class="bracket">/&gt;</span></a>

    <!-- Live counter -->
    <div class="lost-counter">
        <div>Time Lost: <span id="timeLost">00:00</span></div>
        <div>Facts Discovered: <span id="factCount">0</span></div>
        <div>Stars Witnessed: <span id="starCount">0</span></div>
    </div>

    <!-- Main Content -->
    <div class="content">
        <div class="error-code">404</div>
        <div class="subtitle">&gt;_ ERROR: endpoint_not_found<span class="blink">&#9646;</span></div>
        <p class="tagline">
            You've drifted into the <em>data void</em>. This page got lost somewhere between
            a failed JOIN and a missing partition. But hey — while you're here, <em>catch some knowledge</em> flying by.
        </p>
        <div class="actions">
            <a href="index.html" class="btn btn-home">&#9889; Beam Me Home</a>
            <button class="btn btn-fact" id="factBtn" onclick="spawnFactCard()">&#10024; Drop a Fun Fact</button>
        </div>
    </div>

    <!-- Fact Zone -->
    <div class="fact-zone">
        <div class="fact-card" id="factCard">
            <div class="fact-label" id="factLabel">
                <span class="icon"></span>
                <span class="label-text"></span>
            </div>
            <p class="fact-text" id="factText"></p>
            <div class="fact-progress" id="factProgress"></div>
        </div>
    </div>

    <script src="fact-engine.js"></script>
    <script>
        ; (function () {
            'use strict';

            var factIndex = 0;
            var factTimeout = null;
            var factCountEl = document.getElementById('factCount');
            var starCountEl = document.getElementById('starCount');
            var timeLostEl = document.getElementById('timeLost');
            var factCardEl = document.getElementById('factCard');
            var factLabelEl = document.getElementById('factLabel');
            var factTextEl = document.getElementById('factText');
            var factProgressEl = document.getElementById('factProgress');
            var factsShown = 0;
            var starsShown = 0;
            var startTime = Date.now();

            // ============================================================
            //  STARFIELD + SHOOTING STARS CANVAS
            // ============================================================
            var canvas = document.getElementById('starfield');
            var ctx = canvas.getContext('2d');
            var W, H;
            var bgStars = [];
            var shootingStars = [];
            var factShooters = [];

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                initBgStars();
            }
            window.addEventListener('resize', resize);
            resize();

            function initBgStars() {
                bgStars = [];
                var count = Math.floor((W * H) / 3000);
                for (var i = 0; i < count; i++) {
                    bgStars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        r: Math.random() * 1.5 + 0.3,
                        twinkleSpeed: Math.random() * 0.02 + 0.005,
                        twinkleOffset: Math.random() * Math.PI * 2,
                        baseAlpha: Math.random() * 0.6 + 0.2,
                    });
                }
            }

            // ===== Shooting Star Class =====
            function ShootingStar(carryText) {
                this.carryText = carryText || null;
                this.reset();
            }
            ShootingStar.prototype.reset = function () {
                var side = Math.random();
                if (side < 0.5) {
                    this.x = Math.random() * W * 0.8;
                    this.y = -10;
                } else {
                    this.x = W + 10;
                    this.y = Math.random() * H * 0.5;
                }
                this.angle = Math.PI * 0.15 + Math.random() * Math.PI * 0.3;
                this.speed = 1 + Math.random() * 1.5;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.tail = [];
                this.maxTail = 40 + Math.floor(Math.random() * 40);
                this.life = 1;
                this.decay = 0.0008 + Math.random() * 0.0007;
                this.size = 1.5 + Math.random() * 2;
                this.hue = [190, 270, 340, 50][Math.floor(Math.random() * 4)];
                this.alive = true;
                this.textAlpha = 1;
                this.textFadeStart = false;
            };
            ShootingStar.prototype.update = function () {
                this.tail.unshift({ x: this.x, y: this.y });
                if (this.tail.length > this.maxTail) this.tail.pop();
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                if (this.life <= 0 || this.x > W + 200 || this.y > H + 200 || this.x < -200) {
                    this.alive = false;
                }
                if (this.life < 0.3) this.textFadeStart = true;
                if (this.textFadeStart) this.textAlpha = Math.max(0, this.textAlpha - 0.004);
            };
            ShootingStar.prototype.draw = function () {
                // Draw tail
                for (var i = 0; i < this.tail.length; i++) {
                    var t = this.tail[i];
                    var alpha = (1 - i / this.tail.length) * this.life * 0.6;
                    var r = this.size * (1 - i / this.tail.length);
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
                    ctx.fillStyle = 'hsla(' + this.hue + ', 100%, 70%, ' + alpha + ')';
                    ctx.fill();
                }
                // Draw head
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = 'hsla(' + this.hue + ', 100%, 90%, ' + this.life + ')';
                ctx.fill();
                // Glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
                ctx.fillStyle = 'hsla(' + this.hue + ', 100%, 70%, ' + (this.life * 0.15) + ')';
                ctx.fill();

                // Draw carried text
                if (this.carryText && this.textAlpha > 0) {
                    ctx.save();
                    ctx.font = "500 13px 'JetBrains Mono', monospace";
                    ctx.fillStyle = 'hsla(' + this.hue + ', 100%, 80%, ' + this.textAlpha + ')';
                    ctx.shadowColor = 'hsla(' + this.hue + ', 100%, 60%, 0.6)';
                    ctx.shadowBlur = 10;
                    ctx.fillText(this.carryText, this.x + 15, this.y - 8);
                    ctx.restore();
                }
            };

            // ===== Spawn shooting stars slowly, limit 1-2 on screen =====
            function spawnShootingStar() {
                if (shootingStars.length >= 2) {
                    // Maximum of 2 shooting stars on screen at a time
                    setTimeout(spawnShootingStar, 5000);
                    return;
                }
                var text = window.generateRandomSnippet(); // From KB Generator
                var star = new ShootingStar(text);
                star.speed = 0.5 + Math.random() * 0.8; // extremely slow
                star.vx = Math.cos(star.angle) * star.speed;
                star.vy = Math.sin(star.angle) * star.speed;
                shootingStars.push(star);
                starsShown++;
                starCountEl.textContent = starsShown;
                var next = 20000 + Math.random() * 10000; // spawn every ~20s
                setTimeout(spawnShootingStar, next);
            }
            setTimeout(spawnShootingStar, 2000);

            // ===== ANIMATION LOOP =====
            var time = 0;
            function animate() {
                ctx.clearRect(0, 0, W, H);
                time += 0.016;

                // Draw background stars with twinkling
                for (var i = 0; i < bgStars.length; i++) {
                    var s = bgStars[i];
                    var alpha = s.baseAlpha + Math.sin(time * 60 * s.twinkleSpeed + s.twinkleOffset) * 0.3;
                    alpha = Math.max(0.05, Math.min(1, alpha));
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(200, 220, 255, ' + alpha + ')';
                    ctx.fill();
                }

                // Update and draw shooting stars
                for (var i = shootingStars.length - 1; i >= 0; i--) {
                    shootingStars[i].update();
                    shootingStars[i].draw();
                    if (!shootingStars[i].alive) shootingStars.splice(i, 1);
                }

                requestAnimationFrame(animate);
            }
            animate();

            // ============================================================
            //  FUN FACT CARD DISPLAY
            // ============================================================
            window.spawnFactCard = function () {
                var fact = window.generateRandomFact();
                factIndex++;
                factsShown++;
                factCountEl.textContent = factsShown;

                // Reset animation
                clearTimeout(factTimeout);
                factCardEl.classList.remove('visible', 'hiding');
                factProgressEl.style.animation = 'none';

                // Set content
                factLabelEl.className = 'fact-label ' + fact.cat;
                factLabelEl.querySelector('.icon').textContent = fact.icon;
                factLabelEl.querySelector('.label-text').textContent = fact.label;
                factTextEl.innerHTML = fact.text;

                // Show
                void factCardEl.offsetHeight; // force reflow
                factProgressEl.style.animation = 'progressShrink 20s linear forwards';
                factCardEl.classList.add('visible');

                // Auto-hide after 20s, then 5s fade-out
                factTimeout = setTimeout(function () {
                    factCardEl.classList.add('hiding');
                    setTimeout(function () {
                        factCardEl.classList.remove('visible', 'hiding');
                    }, 5000);
                }, 20000); // 20 seconds wait as requested
            };

            // ============================================================
            //  TIME LOST COUNTER
            // ============================================================
            setInterval(function () {
                var elapsed = Math.floor((Date.now() - startTime) / 1000);
                var mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
                var secs = String(elapsed % 60).padStart(2, '0');
                timeLostEl.textContent = mins + ':' + secs;
            }, 1000);

            // ============================================================
            //  AUTO-SHOW FACTS every 12-18s to keep it alive
            // ============================================================
            function autoFact() {
                spawnFactCard();
                setTimeout(autoFact, 25000 + Math.random() * 10000);
            }
            // Auto fact will show after the first 20 seconds
            setTimeout(autoFact, 20000);

        })();
    </script>
</body>

</html>
